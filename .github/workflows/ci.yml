name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install JS deps
        run: bun install

      - name: Build CLI package
        run: bun run build:cli

      - name: Build MCP package
        run: bun run build:mcp

      - name: Run unit tests
        run: bun test --test-timeout=300000 --exclude="documentation/tests/e2e/packed/**"

      - name: Run integration tests
        run: bash ./scripts/run-integration-tests.sh

  packed-e2e-cli-regression:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Build packages
        run: |
          bun install
          bun run build:cli
          bun run build:mcp
      - name: Pack packages
        run: |
          cd packages/core && npm pack
          cd ../cli && npm pack
          cd ../mcp && npm pack
      - name: Run CLI regression tests
        run: |
          bun test --test-timeout=300000 documentation/tests/e2e/packed/cli-workflows.test.ts
          bun test --test-timeout=300000 documentation/tests/e2e/packed/cli-query-regression.test.ts
        env:
          KIBI_E2E_ALLOW_PATCHED_INSTALL: "0"
          KIBI_TEST_TARBALLS: ${{ github.workspace }}/packages
        timeout-minutes: 10

  packed-e2e-mcp-regression:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Build packages
        run: |
          bun install
          bun run build:cli
          bun run build:mcp
      - name: Pack packages
        run: |
          cd packages/core && npm pack
          cd ../cli && npm pack
          cd ../mcp && npm pack
      - name: Run MCP protocol regression tests
        run: |
          bun test --test-timeout=300000 documentation/tests/e2e/packed/mcp-protocol-regression.test.ts
        env:
          KIBI_E2E_ALLOW_PATCHED_INSTALL: "0"
          KIBI_TEST_TARBALLS: ${{ github.workspace }}/packages
        timeout-minutes: 10

  packed-e2e-tarball-verify:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Build packages
        run: |
          bun install
          bun run build:cli
          bun run build:mcp
      - name: Pack packages
        run: |
          cd packages/core && npm pack
          cd ../cli && npm pack
          cd ../mcp && npm pack
      - name: Run tarball verification
        run: |
          bun test --test-timeout=300000 documentation/tests/e2e/packed/cli-verify-tarball-core.test.ts
        env:
          KIBI_TEST_TARBALLS: ${{ github.workspace }}/packages
        timeout-minutes: 5

  packed-e2e-branch-workflow:
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Build packages
        run: |
          bun install
          bun run build:cli
          bun run build:mcp
      - name: Pack packages
        run: |
          cd packages/core && npm pack
          cd ../cli && npm pack
          cd ../mcp && npm pack
      - name: Run branch workflow tests
        run: |
          bun test --test-timeout=300000 documentation/tests/e2e/packed/branch-workflow.test.ts
        env:
          KIBI_E2E_ALLOW_PATCHED_INSTALL: "0"
          KIBI_TEST_TARBALLS: ${{ github.workspace }}/packages
        timeout-minutes: 15
