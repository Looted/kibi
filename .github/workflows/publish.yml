name: Publish to npm

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      packages:
        description: 'Comma-separated list of packages to publish (e.g., core,cli,mcp). If empty, auto-detect changed packages.'
        required: false
        default: ''
      dry-run:
        description: 'Perform a dry run (no actual publish)'
        required: false
        default: false
        type: boolean
jobs:
  build-and-check:
    runs-on: ubuntu-latest
    outputs:
      to_publish: ${{ steps.check-packages.outputs.to_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify npm auth and tooling
        run: |
          node --version
          npm --version
          npm whoami
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Install dependencies
        run: bun install
      - name: Build CLI package
        run: bun run build:cli
      - name: Build MCP package
        run: bun run build:mcp
      - name: Run tests
        run: bun test
      - name: Determine packages to publish
        id: check-packages
        run: |
          to_publish=""
          
          check_package() {
            local pkg_name="$1"
            local pkg_dir="$2"
            local version=$(node -p "require('./packages/${pkg_dir}/package.json').version")
            
            echo "Checking ${pkg_name} local version: ${version}"
            
            if npm view ${pkg_name}@${version} version > /dev/null 2>&1; then
              echo "${pkg_name}@${version} already exists on npm"
              return 0
            else
              echo "${pkg_name}@${version} needs to be published"
              to_publish="${to_publish}${pkg_dir}=${pkg_name}"$'\n'
              return 0
            fi
          }
          
          if [ -n "${{ inputs.packages }}" ]; then
            IFS=',' read -ra PACKAGES <<< "${{ inputs.packages }}"
            for pkg in "${PACKAGES[@]}"; do
              pkg=$(echo $pkg | xargs)
              case $pkg in
                core) check_package "kibi-core" "core" ;;
                cli) check_package "kibi-cli" "cli" ;;
                mcp) check_package "kibi-mcp" "mcp" ;;
                vscode) echo "kibi-vscode is published to VS Code Marketplace, not npm" ;;
                *) echo "Unknown package: $pkg" ;;
              esac
            done
          else
            check_package "kibi-core" "core"
            check_package "kibi-cli" "cli"
            check_package "kibi-mcp" "mcp"
          fi
          
          echo "to_publish<<EOF" >> $GITHUB_OUTPUT
          echo -n "$to_publish" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  release-gate:
    runs-on: ubuntu-latest
    needs: build-and-check
    if: ${{ needs.build-and-check.outputs.to_publish != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install SWI-Prolog
        run: sudo apt-get update && sudo apt-get install -y swi-prolog
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Install dependencies
        run: bun install
      - name: Build packages
        run: |
          bun run build:cli
          bun run build:mcp
      - name: Pack packages
        run: |
          cd packages/core && npm pack
          cd ../cli && npm pack
          cd ../mcp && npm pack
      - name: Tarball content verification
        run: |
          bun test documentation/tests/e2e/packed/cli-verify-tarball-core.test.ts
        timeout-minutes: 5
      - name: Strict install smoke test
        run: |
          mkdir -p /tmp/kibi-smoke-test
          cd /tmp/kibi-smoke-test
          npm init -y
          npm install ${{ github.workspace }}/packages/core/kibi-core-*.tgz
          npm install ${{ github.workspace }}/packages/cli/kibi-cli-*.tgz
          npm install ${{ github.workspace }}/packages/mcp/kibi-mcp-*.tgz
          ./node_modules/.bin/kibi --version
          ./node_modules/.bin/kibi init --no-hooks
          ./node_modules/.bin/kibi query req
        env:
          KIBI_E2E_ALLOW_PATCHED_INSTALL: "0"
        timeout-minutes: 5
      - name: MCP server smoke test
        run: |
          cd /tmp/kibi-smoke-test
          timeout 10s ./node_modules/.bin/kibi-mcp < /dev/null || true
        timeout-minutes: 2

  publish:
    runs-on: ubuntu-latest
    needs: [build-and-check, release-gate]
    if: ${{ needs.build-and-check.outputs.to_publish != '' && inputs.dry-run != true }}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - name: Install dependencies
        run: bun install
      - name: Build packages
        run: |
          bun run build:cli
          bun run build:mcp
      - name: Publish packages
        run: |
          to_publish="${{ needs.build-and-check.outputs.to_publish }}"
          while IFS= read -r output; do
            [ -z "$output" ] && continue
            pkg_dir="${output%=*}"
            pkg_name="${output#*=}"
            echo "Publishing ${pkg_name}..."
            cd packages/${pkg_dir} && npm publish --provenance --access public && cd ../..
          done <<< "$to_publish"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
